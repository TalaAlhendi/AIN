<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="images/AIN/ain.png" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Explore upcoming and past events from the Arab Innovation Network." />
  <title>Events — Arab Innovation Network</title>

  <!-- Global site styles -->
  <link rel="stylesheet" href="/styles.css" />
  <!-- Events page styles (React-aware) -->
  <link rel="stylesheet" href="/assets/css/events.css" />

  <!-- Google Fonts (matches rest of site) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!-- React 18 + ReactDOM (UMD / production) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone — transpiles JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>

  <!-- ── GLOBAL HEADER (unchanged) ── -->
  <header class="site-header">
    <div class="container">
      <a href="/index.html" class="logo" aria-label="Arab Innovation Network home">
        <img src="/components/AINLogo-2.png" alt="AIN" />
      </a>
      <nav class="main-nav nav" id="site-nav">
        <ul>
          <li><a href="/index.html">Home</a></li>
          <li><a href="/about.html">About Us</a></li>
          <li><a href="/events.html" class="current-page">Events</a></li>
          <li><a href="/contactus.html">Contact Us</a></li>
        </ul>
      </nav>
      <button class="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false" id="navToggle">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>
  </header>
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- ── REACT ROOT — all events UI is rendered here ── -->
  <div id="events-root"></div>

 <!-- Footer -->
 <footer class="site-footer">
  <div class="container">
    <div class="footer-brand">
      <a href="/" class="logo" aria-label="Arab Innovation Network home">
        <img src="/components/AINLogo-2.png" alt="AIN" />
      </a>
      <p>Arab Innovation Network</p>
    </div>

    <nav class="footer-nav" aria-label="Footer">
      <ul>
        <li><a href="/index.html">Home</a></li>
        <li><a href="/about.html">About Us</a></li>
        <li><a href="/events.html">Events</a></li>
        <li><a href="/contactus.html">Contact Us</a></li>
      </ul>
    </nav>

    <div class="footer-meta">
      <p>
        <span id="year"></span> © Arab Innovation Network. All rights reserved.
      </p>
      <p class="meta-links">
        <a href="/privacy.html">Privacy</a>
        <span aria-hidden="true">·</span>
        <a href="/terms.html">Terms</a>
      </p>
    </div>
  </div>
</footer>

<script>
  // Auto-update year in footer
  (function () {
    var y = document.getElementById('year');
    if (y) {
      y.textContent = new Date().getFullYear();
    }
  })();
</script>


  <!-- Global nav logic (hamburger etc.) -->
  <script src="/script.js"></script>

  <!-- React Events App — type="text/babel" for JSX transpilation -->
  <script type="text/babel" src="/assets/js/events.js"></script>

  
</body>

</html>
